app = "contextual-proxy"
primary_region = "sjc"  # San Jose — change to your nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  # shared-cpu-1x + 512MB is free tier eligible
