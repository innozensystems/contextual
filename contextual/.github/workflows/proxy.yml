name: Proxy Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'proxy/**'
  pull_request:
    branches: [main]
    paths:
      - 'proxy/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff==0.15.16

      - name: Lint and format check
        run: |
          cd proxy
          ruff check app/ tests/
          ruff format --check app/ tests/

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd proxy
          pip install -r requirements-test.txt

      - name: Audit dependencies
        run: |
          pip install pip-audit
          cd proxy
          pip-audit -r requirements.txt -r requirements-test.txt || true

      - name: Run tests with coverage
        run: |
          cd proxy
          pytest tests/ -v --cov=app --cov-branch --cov-fail-under=95

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd proxy
          docker build -t contextual-proxy:ci .

      - name: Smoke test container
        run: |
          docker run -d --name proxy-smoke -p 18000:8000 \
            -e MAPBOX_TOKEN=dummy-token-for-test \
            -e REDIS_URL=redis://localhost:6379/0 \
            contextual-proxy:ci

          # Wait up to 15 seconds for /health
          for i in $(seq 30); do
            if curl -sf http://localhost:18000/health | grep -q '"status":"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            sleep 0.5
          done

          echo "Health check failed — container logs:"
          docker logs proxy-smoke
          exit 1

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: contextual-proxy:ci
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Cleanup
        if: always()
        run: |
          docker rm -f proxy-smoke || true
          docker rmi contextual-proxy:ci || true

  deploy:
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t contextual-proxy:${{ github.sha }} proxy

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          docker tag contextual-proxy:${{ github.sha }} ghcr.io/${{ github.repository }}/contextual-proxy:${{ github.sha }}
          docker tag contextual-proxy:${{ github.sha }} ghcr.io/${{ github.repository }}/contextual-proxy:latest
          docker push ghcr.io/${{ github.repository }}/contextual-proxy:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/contextual-proxy:latest

      - name: Sign image with Cosign (placeholder)
        run: |
          echo "Install cosign and run:"
          echo "cosign sign --yes ghcr.io/${{ github.repository }}/contextual-proxy:${{ github.sha }}"
