name: iOS Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'proxy/**'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into Info.plist
        run: |
          cd ios
          plutil -replace SUPABASE_URL -string "${SUPABASE_URL}" Contextual/Info.plist
          plutil -replace SUPABASE_ANON_KEY -string "${SUPABASE_ANON_KEY}" Contextual/Info.plist
          plutil -replace PROXY_BASE_URL -string "${PROXY_BASE_URL}" Contextual/Info.plist
          plutil -replace PROXY_CERTIFICATE_PINS -string "${PROXY_CERTIFICATE_PINS}" Contextual/Info.plist
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PROXY_BASE_URL: ${{ secrets.PROXY_BASE_URL }}
          PROXY_CERTIFICATE_PINS: ${{ secrets.PROXY_CERTIFICATE_PINS }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install dependencies
        run: |
          cd ios
          bundle install

      - name: Run tests
        run: |
          cd ios
          bundle exec fastlane test

      - name: Build archive
        if: github.ref == 'refs/heads/main'
        run: |
          cd ios
          bundle exec fastlane build_archive
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into Info.plist
        run: |
          cd ios
          plutil -replace SUPABASE_URL -string "${SUPABASE_URL}" Contextual/Info.plist
          plutil -replace SUPABASE_ANON_KEY -string "${SUPABASE_ANON_KEY}" Contextual/Info.plist
          plutil -replace PROXY_BASE_URL -string "${PROXY_BASE_URL}" Contextual/Info.plist
          plutil -replace PROXY_CERTIFICATE_PINS -string "${PROXY_CERTIFICATE_PINS}" Contextual/Info.plist
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PROXY_BASE_URL: ${{ secrets.PROXY_BASE_URL }}
          PROXY_CERTIFICATE_PINS: ${{ secrets.PROXY_CERTIFICATE_PINS }}

      - name: Deploy to TestFlight
        run: |
          cd ios
          bundle exec fastlane beta
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
